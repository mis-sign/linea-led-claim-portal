<svg viewBox="0 0 1200 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tGlowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f2790a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f2790a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tGlowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d6fb8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1d6fb8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tGlowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f8348" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1f8348" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="150" cy="45" r="130" fill="url(#tGlowBlue)"/>
  <circle cx="620" cy="20" r="110" fill="url(#tGlowOrange)"/>
  <circle cx="980" cy="60" r="140" fill="url(#tGlowGreen)"/>
  <circle cx="1150" cy="10" r="100" fill="url(#tGlowOrange)"/>

  <!-- Water-drop ripple rings, positioned to actually sit within this thin band -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.10">
    <circle cx="620" cy="45" r="20"/>
    <circle cx="620" cy="45" r="35"/>
    <circle cx="620" cy="45" r="50"/>
  </g>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.08">
    <circle cx="980" cy="45" r="15"/>
    <circle cx="980" cy="45" r="28"/>
  </g>
</svg>
